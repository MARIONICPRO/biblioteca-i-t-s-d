<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Estudiantes</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="page-container">
        <nav class="navbar">
            <h2>👥 Gestión de Estudiantes</h2>
            <div>
                <button onclick="window.location.href='dashboard.html'" class="btn-back">← Volver</button>
                <button onclick="cerrarSesion()" class="btn-logout">Cerrar Sesión</button>
            </div>
        </nav>

        <div class="content">
            <!-- Formulario -->
            <div class="form-container">
                <h3 id="formTitulo">Registrar Estudiante</h3>
                <input type="hidden" id="estudianteId">
                
                <div class="form-grid">
                    <input type="text" id="identificacion" placeholder="Identificación *" required>
                    <input type="text" id="nombre" placeholder="Nombre *" required>
                    <input type="text" id="apellido" placeholder="Apellido *" required>
                    <input type="text" id="curso" placeholder="Curso">
                    <input type="email" id="correo" placeholder="Correo electrónico">
                    <input type="tel" id="telefono" placeholder="Teléfono">
                    
                    <div class="checkbox-group">
                        <label>
                            <input type="checkbox" id="estado" checked> Activo
                        </label>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button onclick="guardarEstudiante()" class="btn-primary">💾 Guardar</button>
                    <button onclick="limpiarFormulario()" class="btn-secondary">🗑 Limpiar</button>
                </div>
                <p id="mensaje" class="message"></p>
            </div>

            <!-- Tabla -->
            <div class="table-container">
                <h3>Listado de Estudiantes</h3>
                <input type="text" id="buscarEstudiante" placeholder="🔍 Buscar estudiante..." class="search-box">
                
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Identificación</th>
                            <th>Nombre Completo</th>
                            <th>Curso</th>
                            <th>Correo</th>
                            <th>Teléfono</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="estudiantesBody">
                        <tr>
                            <td colspan="8" class="text-center">Cargando...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/estudiantes.js"></script>
</body>
</html>
