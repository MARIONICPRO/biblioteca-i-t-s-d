<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Libros</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="page-container">
        <nav class="navbar">
            <h2>📚 Gestión de Libros</h2>
            <div>
                <button onclick="window.location.href='dashboard.html'" class="btn-back">← Volver</button>
                <button onclick="cerrarSesion()" class="btn-logout">Cerrar Sesión</button>
            </div>
        </nav>

        <div class="content">
            <!-- Formulario -->
            <div class="form-container">
                <h3 id="formTitulo">Registrar Libro</h3>
                <input type="hidden" id="libroId">
                
                <div class="form-grid">
                    <input type="text" id="codigo_libro" placeholder="Código del libro *" required>
                    <input type="text" id="titulo" placeholder="Título *" required>
                    <input type="text" id="autor" placeholder="Autor">
                    <input type="text" id="editorial" placeholder="Editorial">
                    <input type="number" id="anio_publicacion" placeholder="Año publicación">
                    <input type="text" id="isbn" placeholder="ISBN">
                    <input type="text" id="categoria" placeholder="Categoría">
                    <input type="number" id="cantidad_total" placeholder="Cantidad total *" min="1" required>
                    <input type="number" id="cantidad_disponible" placeholder="Cantidad disponible *" min="0" required>
                    
                    <div class="checkbox-group">
                        <label>
                            <input type="checkbox" id="estado" checked> Activo
                        </label>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button onclick="guardarLibro()" class="btn-primary">💾 Guardar</button>
                    <button onclick="limpiarFormulario()" class="btn-secondary">🗑 Limpiar</button>
                </div>
                <p id="mensaje" class="message"></p>
            </div>

            <!-- Tabla -->
            <div class="table-container">
                <h3>Listado de Libros</h3>
                <input type="text" id="buscarLibro" placeholder="🔍 Buscar libro..." class="search-box">
                
                <table>
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Título</th>
                            <th>Autor</th>
                            <th>Categoría</th>
                            <th>Total</th>
                            <th>Disponible</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="librosBody">
                        <tr>
                            <td colspan="8" class="text-center">Cargando...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/libros.js"></script>
</body>
</html>
